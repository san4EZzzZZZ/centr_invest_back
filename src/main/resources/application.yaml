spring:
  application:
    name: interview-prep
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_prep}
    username: ${DB_USERNAME:interview_prep}
    password: ${DB_PASSWORD:interview_prep}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  servlet:
    multipart:
      max-file-size: ${AVATAR_MAX_FILE_SIZE:5MB}
      max-request-size: ${AVATAR_MAX_REQUEST_SIZE:5MB}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN

app:
  mail:
    from: ${MAIL_FROM:no-reply@interview-prep.local}
    code-ttl: ${MAIL_CODE_TTL:10m}
  storage:
    avatars-dir: ${AVATARS_DIR:uploads/avatars}
  ai:
    openai:
      base-url: ${AI_BASE_URL:https://integrate.api.nvidia.com/v1}
      api-key: ${AI_API_KEY:${OPENAI_API_KEY:}}
      model: ${AI_MODEL:${OPENAI_MODEL:meta/llama-3.1-70b-instruct}}
      connect-timeout: ${AI_CONNECT_TIMEOUT:5s}
      read-timeout: ${AI_READ_TIMEOUT:30s}
    answer-check:
      enabled: ${AI_ANSWER_CHECK_ENABLED:true}
      min-confidence: ${AI_ANSWER_CHECK_MIN_CONFIDENCE:0.75}

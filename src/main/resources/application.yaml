spring:
  application:
    name: interview-prep
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/interview_prep}
    username: ${DB_USERNAME:interview_prep}
    password: ${DB_PASSWORD:interview_prep}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN

app:
  ai:
    openai:
      base-url: ${AI_BASE_URL:https://integrate.api.nvidia.com/v1}
      api-key: ${AI_API_KEY:${OPENAI_API_KEY:}}
      model: ${AI_MODEL:${OPENAI_MODEL:meta/llama-3.1-70b-instruct}}
    answer-check:
      enabled: ${AI_ANSWER_CHECK_ENABLED:true}
      min-confidence: ${AI_ANSWER_CHECK_MIN_CONFIDENCE:0.75}

services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-prep-postgres
    environment:
      POSTGRES_DB: interview_prep
      POSTGRES_USER: interview_prep
      POSTGRES_PASSWORD: interview_prep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_prep"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: interview-prep-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/interview_prep
      - DB_USERNAME=interview_prep
      - DB_PASSWORD=interview_prep
      - AI_API_KEY=${AI_API_KEY}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-true}
      - MAIL_SMTP_STARTTLS=${MAIL_SMTP_STARTTLS:-true}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
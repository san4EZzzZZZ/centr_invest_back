services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-prep-postgres
    environment:
      POSTGRES_DB: interview_prep
      POSTGRES_USER: interview_prep
      POSTGRES_PASSWORD: interview_prep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
